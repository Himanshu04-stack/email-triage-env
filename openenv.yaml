name: email-triage-env
description: Real-world email triage environment for SaaS support teams
tags:
  - openenv

env_url: https://Himanshu0004-email-triage-env.hf.space

action:
  type: object
  properties:
    priority:
      type: string
      enum: [urgent, normal, low]
    category:
      type: string
      enum: [bug, feature_request, billing, spam, support, other]
    assigned_team:
      type: string
      enum: [engineering, billing, support, sales, ignore]
    summary:
      type: string

observation:
  type: object
  properties:
    email_id:
      type: string
    subject:
      type: string
    body:
      type: string
    sender:
      type: string
    task_id:
      type: string
    task_description:
      type: string

tasks:
  - id: task_easy
    description: Classify email priority only
    difficulty: easy
  - id: task_medium
    description: Classify priority and category
    difficulty: medium
  - id: task_hard
    description: Full triage with priority, category, team and summary
    difficulty: hard
