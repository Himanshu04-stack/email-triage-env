name: email-triage-env
version: "1.0.0"
description: >
  A real-world OpenEnv environment that simulates email triage for a SaaS company support team.
  An AI agent receives incoming support emails and must classify them by priority, category,
  and assign them to the correct team — exactly as a human support manager would.

author: openenv-hackathon-submission
tags:
  - openenv
  - email
  - triage
  - support
  - classification
  - nlp
  - real-world

observation_space:
  type: object
  fields:
    email_id: {type: string, description: "Unique identifier for the email"}
    subject: {type: string, description: "Email subject line"}
    body: {type: string, description: "Full email body text"}
    sender: {type: string, description: "Sender email address"}
    sender_domain: {type: string, description: "Domain of the sender"}
    timestamp: {type: string, description: "ISO 8601 timestamp"}
    has_attachment: {type: boolean, description: "Whether the email has attachments"}
    thread_length: {type: integer, description: "Number of messages in the thread"}
    task_id: {type: string, description: "Current task identifier"}
    task_description: {type: string, description: "Natural language description of what the agent must do"}

action_space:
  type: object
  fields:
    priority:
      type: string
      enum: [urgent, normal, low]
      description: "Urgency level of the email"
    category:
      type: string
      enum: [bug, feature_request, billing, spam, support, other]
      description: "Topic category of the email"
    assigned_team:
      type: string
      enum: [engineering, billing, support, sales, ignore]
      description: "Team that should handle this email"
    summary:
      type: string
      description: "One-sentence summary of the key issue (scored in task_hard)"

tasks:
  - id: task_easy
    difficulty: easy
    description: "Classify email priority only (urgent/normal/low)"
    target_baseline_score: 0.70
    grading_fields: [priority]
    reward_range: [0.0, 1.0]

  - id: task_medium
    difficulty: medium
    description: "Classify both priority and category correctly"
    target_baseline_score: 0.50
    grading_fields: [priority, category]
    reward_range: [0.0, 1.0]

  - id: task_hard
    difficulty: hard
    description: "Full triage: priority + category + assigned_team + concise summary"
    target_baseline_score: 0.35
    grading_fields: [priority, category, assigned_team, summary]
    reward_range: [0.0, 1.0]

reward:
  type: float
  range: [0.0, 1.0]
  description: >
    Weighted combination of field-level accuracy.
    Easy: priority accuracy (1.0).
    Medium: priority (50%) + category (50%).
    Hard: priority (40%) + category (30%) + assigned_team (20%) + summary keyword coverage (10%).
    Partial credit given for adjacent priority errors (urgent vs normal).
    Penalty applied for excessively long summaries (>300 chars).

episode:
  length: 6
  description: "Each episode presents 6 emails. The agent must triage all 6 to complete the episode."

endpoints:
  reset: POST /reset
  step: POST /step
  state: GET /state
  tasks: GET /tasks
  grader: POST /grader
  baseline: POST /baseline

baseline:
  model: gpt-3.5-turbo
  fallback: rule-based (no API key required)
  scores:
    task_easy: 0.72
    task_medium: 0.51
    task_hard: 0.38
